server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    server_tokens off;
    charset       utf-8;

    root  /usr/share/nginx/html;
    index index.html;

    # ─── Achter Nginx Proxy Manager ─────────────────────────────────
    # Vertrouw X-Forwarded-* alleen vanaf private/docker-ranges,
    # zodat client-IP's correct gelogd worden i.p.v. het NPM-IP.
    set_real_ip_from  172.16.0.0/12;
    set_real_ip_from  10.0.0.0/8;
    set_real_ip_from  192.168.0.0/16;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    # ─── Security headers ───────────────────────────────────────────
    add_header X-Content-Type-Options    "nosniff"                                always;
    add_header X-Frame-Options           "DENY"                                   always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"        always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Cross-Origin-Opener-Policy   "same-origin"                          always;
    add_header Cross-Origin-Resource-Policy "same-origin"                          always;

    # CSP — alle CSS/JS is inline en lokaal. data: voor de SVG-favicon en portrait-placeholder.
    add_header Content-Security-Policy "default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; manifest-src 'self'" always;

    # Cache: HTML kort (5 min) zodat updates snel zichtbaar zijn op de live site
    add_header Cache-Control "public, max-age=300, must-revalidate" always;

    # ─── Compression ────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types        text/plain text/css application/javascript text/javascript
                      application/json application/xml image/svg+xml application/manifest+json;

    # ─── Routing ────────────────────────────────────────────────────
    # Healthcheck (geen log, geen cache, geen headers nodig)
    location = /healthz {
        access_log    off;
        default_type  text/plain;
        return        200 "ok\n";
    }

    # Blokkeer dotfiles (.git, .env, etc.) — defense in depth, ze zitten niet in de image
    location ~ /\. {
        deny all;
        access_log    off;
        log_not_found off;
    }

    # robots.txt / sitemap inline serveren — geen losse bestanden nodig
    location = /robots.txt {
        default_type text/plain;
        return 200 "User-agent: *\nAllow: /\nDisallow: /compliance-scan-tool\nDisallow: /compliance-scan-tool.html\nDisallow: /pso-tool\nDisallow: /pso-tool.html\n";
    }

    # Pretty URLs: /pso-tool resolveert naar /pso-tool.html
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Eenvoudige 404-fallback: serveer index.html (single-page-vibe) — uit als je hard wilt 404'en
    # error_page 404 = /index.html;
}
