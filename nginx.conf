# Numanski — gehardende nginx vhost
# Wordt gemount op /etc/nginx/conf.d/default.conf
#
# Tweede file (nginx-zone.conf) op http{} niveau bevat de rate-limit zone.

# ─── Rate-limit zone (per real IP) ──────────────────────────────────
# Globale beperking op /api/: 10 req/min met burst 5 (kort uitschieten OK).
limit_req_zone $real_ip zone=api_zone:1m rate=10r/m;
limit_conn_zone $real_ip zone=api_conn:1m;

# ─── Vertrouwde proxy (NPM staat hier doorgaans op de Docker bridge) ──
# 172.16.0.0/12 dekt alle standaard Docker bridge-ranges. Strakker mag
# door alleen NPM's exacte IP toe te voegen.
map $http_x_forwarded_for $real_ip {
    default $remote_addr;
    "~^(?<ip>[^,]+)"  $ip;
}

server {
    listen      80 default_server;
    server_name _;
    root        /usr/share/nginx/html;
    index       index.html;

    # ─── Verberg nginx-versie ──────────────────────────────────
    server_tokens off;

    # ─── Real-IP achter NPM ────────────────────────────────────
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    # ─── Logging ───────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ─── Body-cap ──────────────────────────────────────────────
    client_max_body_size      16k;
    client_body_buffer_size   16k;
    client_header_buffer_size 4k;
    large_client_header_buffers 2 8k;

    # ─── Security headers (op alles) ───────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                         always;
    add_header X-Frame-Options           "SAMEORIGIN"                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "interest-cohort=(), geolocation=(), camera=(), microphone=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin"                    always;
    add_header Cross-Origin-Resource-Policy "same-origin"                  always;
    # CSP — alles same-origin, geen externe CDNs, inline-CSS/JS toegestaan (we hebben geen externe).
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self'; font-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; upgrade-insecure-requests" always;

    # ─── Healthcheck ───────────────────────────────────────────
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return    200 "ok\n";
    }

    # ─── Mail endpoint → PHP-FPM ───────────────────────────────
    location = /api/send-mail {
        # Alleen POST. Andere methods → 405.
        limit_except POST { deny all; }

        # Rate-limit op zone-niveau (10/min, korte burst van 5)
        limit_req       zone=api_zone burst=5 nodelay;
        limit_req_status 429;
        limit_conn      api_conn 4;

        # Geen caching van API-responses
        add_header Cache-Control "no-store" always;

        fastcgi_pass            php:9000;
        fastcgi_index           send-mail.php;
        fastcgi_param           SCRIPT_FILENAME /var/www/api/send-mail.php;
        fastcgi_param           SCRIPT_NAME     /api/send-mail;
        fastcgi_param           REQUEST_METHOD  $request_method;
        fastcgi_param           CONTENT_TYPE    $content_type;
        fastcgi_param           CONTENT_LENGTH  $content_length;
        fastcgi_param           REMOTE_ADDR     $real_ip;
        fastcgi_param           HTTP_ORIGIN     $http_origin;
        fastcgi_param           HTTPS           on;
        include                 fastcgi_params;

        fastcgi_read_timeout    20s;
        fastcgi_send_timeout    20s;
        fastcgi_buffers         8 4k;
        fastcgi_buffer_size     4k;
    }

    # ─── PHP buiten /api altijd blokkeren ──────────────────────
    location ~ \.php$ { return 404; }

    # ─── Verberg dotfiles & backups ────────────────────────────
    location ~ /\.          { deny all; access_log off; log_not_found off; }
    location ~ ~$           { deny all; access_log off; log_not_found off; }
    location ~ \.(bak|old|sql|conf)$ { deny all; access_log off; log_not_found off; }

    # ─── robots.txt inline ─────────────────────────────────────
    location = /robots.txt {
        default_type text/plain;
        return 200 "User-agent: *\nAllow: /\nDisallow: /compliance-scan-tool\nDisallow: /compliance-scan-tool.html\nDisallow: /api/\n";
    }

    # ─── Static met pretty URLs + method-allowlist ─────────────
    location / {
        if ($request_method !~ ^(GET|HEAD)$) { return 405; }
        try_files $uri $uri.html $uri/ =404;
    }

    # ─── Asset cache headers ───────────────────────────────────
    location ~* \.(png|jpe?g|webp|avif|svg|ico|woff2?)$ {
        if ($request_method !~ ^(GET|HEAD)$) { return 405; }
        expires    30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── Custom error pages (geen versie/banner leak) ──────────
    error_page 400 401 403 404 405 413 429 500 502 503 504 = @generic_err;
    location @generic_err {
        internal;
        default_type text/plain;
        return 200 "error\n";
    }
}
