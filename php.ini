; Numanski PHP hardening — laadt naast de stock php.ini.
; Mount op: /usr/local/etc/php/conf.d/zz-numanski.ini

; ─── Info-leakage uit ───────────────────────────────────────
expose_php             = Off
display_errors         = Off
display_startup_errors = Off

; ─── Logs alleen naar stderr (Docker logging) ──────────────
log_errors             = On
error_log              = /proc/self/fd/2
error_reporting        = E_ALL & ~E_DEPRECATED & ~E_STRICT

; ─── Geen remote include / SSRF-vectoren ───────────────────
allow_url_fopen        = Off
allow_url_include      = Off

; ─── Bestandsoperaties begrenzen tot wat we nodig hebben ──
;   /var/www/api  : onze code
;   /tmp          : rate-limit-flatfiles
;   /etc/ssl      : CA-bundle voor STARTTLS cert verify
;   /run/secrets  : Docker secrets (SMTP_PASS_FILE)
open_basedir           = /var/www/api:/tmp:/etc/ssl:/run/secrets

; ─── Gevaarlijke functies blacklisten ──────────────────────
disable_functions      = exec,passthru,shell_exec,system,proc_open,popen,pcntl_exec,curl_exec,curl_multi_exec,parse_ini_file,show_source,phpinfo,getmypid,getmyuid,getmygid,posix_getpwuid,posix_kill,putenv,ini_alter

; ─── Resource caps (DoS-guard) ─────────────────────────────
memory_limit           = 32M
max_execution_time     = 20
max_input_time         = 10
post_max_size          = 16K
upload_max_filesize    = 0
file_uploads           = Off
max_input_vars         = 100

; ─── Sessions niet gebruikt — strenge defaults voor het geval ──
session.use_strict_mode    = 1
session.use_only_cookies   = 1
session.cookie_secure      = 1
session.cookie_httponly    = 1
session.cookie_samesite    = "Strict"

; ─── Date default (voorkomt warning in error_log) ──────────
date.timezone          = Europe/Amsterdam
