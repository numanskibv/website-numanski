# Numanski — lokale dev-overlay.
# Docker compose merge't dit automatisch met docker-compose.yml als
# beide in dezelfde directory staan. Deze file gaat NIET mee naar de
# server (alleen docker-compose.yml + .env worden ge-scp'd).
#
# Doel: lokaal kunnen builden met `docker compose up --build` zonder
# afhankelijk te zijn van de GHCR-registry.

services:
  numanski-web:
    image: numanski-web:local
    build:
      context: .
      dockerfile: Dockerfile
