name: Build & Deploy

# ─────────────────────────────────────────────────────────────────
# Numanski — CI/CD pipeline
#
# Op elke push naar `main`:
#   1) Build het Docker image (Dockerfile)
#   2) Push het naar GHCR  (ghcr.io/numanskibv/website-numanski:latest + :sha-XXXXXXX)
#   3) SSH naar de productie-server en draai `docker compose up -d`
#
# Eenmalige setup (zie ook docker-compose.yml):
#
#   GitHub → Settings → Secrets and variables → Actions → New secret:
#     DEPLOY_HOST     bv.  numanski.nl          (hostname of IP)
#     DEPLOY_USER     bv.  deploy               (SSH-gebruiker)
#     DEPLOY_SSH_KEY       (private key, PEM-formaat — ed25519 aanbevolen)
#     DEPLOY_PATH     bv.  /opt/numanski        (waar docker-compose.yml staat)
#     DEPLOY_PORT     bv.  22                   (optioneel, default 22)
#
#   Op de server, in $DEPLOY_PATH:
#     - docker-compose.yml (deze versie, met env-var image-naam)
#     - .env              met:   NUMANSKI_IMAGE=ghcr.io/numanskibv/website-numanski:latest
#
#   SSH-key genereren (op je workstation):
#     ssh-keygen -t ed25519 -f ~/.ssh/numanski_deploy -N ""
#     ssh-copy-id -i ~/.ssh/numanski_deploy.pub deploy@<server>
#     cat ~/.ssh/numanski_deploy   # → plakken in DEPLOY_SSH_KEY secret
#
#   GHCR-package privacy: standaard 'private'. Eerste push maakt het package
#   aan op https://github.com/numanskibv/website-numanski/pkgs/container/website-numanski
#   Zet het op 'public' in GHCR-settings als je de pull op de server zonder
#   auth wilt — anders gebruikt het deploy-script de short-lived GITHUB_TOKEN
#   via de SSH-sessie (geen persistente secrets op de server).
# ─────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  # Image: ghcr.io/numanskibv/website-numanski
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false   # nooit een lopende deploy halverwege killen

jobs:

  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-ref: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=Numanski Web
            org.opencontainers.image.description=Numanski — static one-pager + audit-tools
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.licenses=Proprietary

      - name: Build & push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy via SSH
    needs: build-and-push
    runs-on: ubuntu-latest
    # Tip: maak een 'production' environment in GitHub → Settings → Environments
    # met required reviewers als je een approval-gate wilt, en voeg dan
    # 'environment: production' hier toe.
    permissions:
      contents: read
      packages: read

    steps:
      - name: SSH-deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
          IMAGE_SHA: ${{ needs.build-and-push.outputs.image-digest }}
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          port:     ${{ secrets.DEPLOY_PORT || 22 }}
          envs:     GHCR_TOKEN,GHCR_ACTOR,IMAGE_SHA
          script_stop: true
          command_timeout: 5m
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"

            echo "→ Login op GHCR (session-scoped token)"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin

            echo "→ Pull image"
            docker compose pull

            echo "→ Up -d  (rolling, geen downtime voor static site)"
            docker compose up -d --remove-orphans

            echo "→ Logout GHCR  (token verloopt sowieso)"
            docker logout ghcr.io >/dev/null 2>&1 || true

            echo "→ Image-cleanup"
            docker image prune -f --filter "until=24h" >/dev/null

            echo "→ Status"
            docker compose ps
            echo "Deployed digest: $IMAGE_SHA"
