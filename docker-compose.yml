# Numanski — Static site deployment (achter Nginx Proxy Manager)
# Quick start (prod/GHCR): docker compose pull && docker compose up -d
# Quick start (lokaal):    docker compose up -d --build   (gebruikt override.yml)
# Logs:                    docker compose logs -f
# Stop:                    docker compose down
#
# DEZE compose-file is bedoeld voor productie: pure pull-from-GHCR, geen
# 'build:' directive. Lokale dev krijgt de build-section via
# docker-compose.override.yml (auto-merged door compose).
#
# De container wordt NIET op de host gepubliceerd. Hij is alleen
# bereikbaar binnen het NPM-Docker-netwerk. Zet in NPM een Proxy Host:
#   Forward Hostname/IP : numanski-web
#   Forward Port        : 80
#   Scheme              : http
#
# Vind de juiste netwerknaam:  docker network ls
# Pas hem aan onderaan dit bestand (default: 'npm').
#
# Server-side .env bevat:
#   NUMANSKI_IMAGE=ghcr.io/numanskibv/website-numanski:latest

services:
  numanski-web:
    image: ${NUMANSKI_IMAGE:-ghcr.io/numanskibv/website-numanski:latest}
    container_name: numanski-web
    restart: unless-stopped

    # Geen poort op de host. NPM bereikt de container via Docker DNS.
    expose:
      - "80"

    networks:
      - npm

    # ─── Hardening ──────────────────────────────────────────────
    read_only: true
    tmpfs:
      - /run:size=8M,mode=0755
      - /var/cache/nginx:size=32M,mode=0755
      - /tmp:size=8M,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN          # nginx master forks workers met nginx-user
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
      - DAC_OVERRIDE

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    labels:
      org.opencontainers.image.title: "Numanski Web"
      org.opencontainers.image.description: "Numanski — static one-pager + PSO/Compliance tools"
      org.opencontainers.image.source: "https://numanski.nl/"
      org.opencontainers.image.licenses: "Proprietary"

networks:
  npm:
    external: true
    # Pas dit aan op de naam van JOUW NPM-netwerk.
    # Vaak: 'nginx-proxy-manager_default' of 'npm' of 'proxy'.
    # Check met:  docker network ls
    name: npm
